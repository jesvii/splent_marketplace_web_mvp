name: Codacy CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Backend quality checks
    runs-on: ubuntu-latest
    env:
      CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage pip-audit codacy-coverage

      - name: Check for outdated dependencies
        run: pip list --outdated

      - name: Security audit with pip-audit
        run: pip-audit || true

      - name: Run tests with coverage
        run: |
          coverage run --source=app -m pytest tests/unit
          coverage xml
        env:
          FLASK_ENV: testing

      - name: Upload coverage to Codacy
        if: github.event_name == 'push'
        run: |
          if [ -z "$CODACY_PROJECT_TOKEN" ]; then
            echo "CODACY_TOKEN secret is not configured; skipping Codacy coverage upload."
            exit 0
          fi

          python-codacy-coverage -r coverage.xml
        env:
          FLASK_ENV: testing

      - name: Clean coverage artifacts
        run: rm -f .coverage coverage.xml
